<section class="section projects-section" id="projects">
  <div class="sec-tag">What I've built</div>
  <h2 class="sec-title">Featured <span>Projects</span></h2>

  <!-- Featured projects (first 2 large) -->
  <div class="featured-grid">
    <div class="project-card featured" *ngFor="let p of projects.slice(0,2)" [style.--c]="p.color">
      <div class="pc-glow"></div>
      <div class="pc-top-bar" [style.background]="p.color"></div>
      <div class="pc-header">
        <span class="pc-emoji">{{ p.emoji }}</span>
        <span class="pc-badge">Featured</span>
      </div>
      <h3 class="pc-title">{{ p.title }}</h3>
      <p class="pc-desc">{{ p.desc }}</p>
      <div class="pc-metrics">
        <span class="metric-chip" *ngFor="let m of p.metrics">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
          {{ m }}
        </span>
      </div>
      <div class="pc-tags">
        <span class="tag-item" *ngFor="let t of p.tags">{{ t }}</span>
      </div>
    </div>
  </div>

  <div class="other-grid">
    <div class="project-card featured" *ngFor="let p of projects.slice(2)" [style.--c]="p.color">
      <div class="pc-glow"></div>
      <div class="pc-top-bar" [style.background]="p.color"></div>
      <div class="pc-header">
        <span class="pc-emoji">{{ p.emoji }}</span>
      </div>
      <h3 class="pc-title">{{ p.title }}</h3>
      <p class="pc-desc">{{ p.desc }}</p>
      <div class="pc-metrics">
        <span class="metric-chip" *ngFor="let m of p.metrics">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
          {{ m }}
        </span>
      </div>
      <div class="pc-tags">
        <span class="tag-item" *ngFor="let t of p.tags">{{ t }}</span>
      </div>
    </div>
  </div>
</section>
